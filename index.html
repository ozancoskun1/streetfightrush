<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <title>STREET FIGHT RUSH</title>
    <script>
      // Fix "Cannot set property fetch of #<Window> which has only a getter" error in sandbox/iframe environments
      (function() {
        try {
          const originalFetch = window.fetch;
          let currentFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get() {
              return currentFetch;
            },
            set(val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Sandbox fetch setter warning:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>

    <script>
      // GitHub Pages runs this project under /streetfightrush/.
      // Safely fix public image paths without patching browser prototypes.
      (function () {
        const repoBase = '/streetfightrush/';
        if (!window.location.pathname.startsWith(repoBase)) return;

        const publicRoots = ['/characters/', '/backgrounds/', '/images/', '/icons/'];

        const fixElement = (element) => {
          if (!(element instanceof HTMLImageElement)) return;
          const rawSrc = element.getAttribute('src');
          if (!rawSrc || rawSrc.startsWith(repoBase)) return;
          if (!publicRoots.some((root) => rawSrc.startsWith(root))) return;
          element.setAttribute('src', `${repoBase}${rawSrc.slice(1)}`);
        };

        const fixImages = (root) => {
          if (root instanceof HTMLImageElement) fixElement(root);
          if (root.querySelectorAll) root.querySelectorAll('img').forEach(fixElement);
        };

        const observer = new MutationObserver((mutations) => {
          for (const mutation of mutations) {
            if (mutation.type === 'attributes') {
              fixElement(mutation.target);
            }
            mutation.addedNodes.forEach((node) => {
              if (node instanceof Element) fixImages(node);
            });
          }
        });

        observer.observe(document.documentElement, {
          childList: true,
          subtree: true,
          attributes: true,
          attributeFilter: ['src']
        });

        window.addEventListener('DOMContentLoaded', () => fixImages(document));
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
